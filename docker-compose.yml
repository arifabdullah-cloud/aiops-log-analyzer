services:
  dummy-app:
    build: ./dummy-app
    container_name: aiops-dummy-app
    ports:
      - "5000:5000"

  ai-analyzer:
    build: ./ai-analyzer
    container_name: aiops-ai-analyzer
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
